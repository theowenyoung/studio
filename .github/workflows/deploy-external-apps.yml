name: Deploy External Applications

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      service:
        description: 'External app to deploy'
        required: true
        type: choice
        options:
          - 'meilisearch'
          - 'owen-blog'
          - 'all'

  # Webhook 触发（例如：博客仓库更新后触发）
  repository_dispatch:
    types: [deploy-external-app]

env:
  ECR_REGISTRY: 912951144733.dkr.ecr.us-west-2.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 缓存 mise 工具
      - name: Cache mise
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('mise.toml') }}

      # 安装 mise
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 激活 mise 环境
      - name: Setup mise
        run: |
          mise install

      # 配置 AWS（用于 ECR 和 Parameter Store）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      # 从 Parameter Store 读取 SSH Key
      - name: Load SSH key from Parameter Store
        run: |
          DEPLOY_SSH_KEY=$(aws ssm get-parameter --name "/studio-prod/DEPLOY_SSH_KEY" --with-decryption --query "Parameter.Value" --output text)

          # 保存 SSH key 到文件
          mkdir -p ~/.ssh
          echo "${DEPLOY_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "✅ SSH key loaded"

      # 登录 ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-west-2 | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      # 确定要部署的服务
      - name: Determine deployment target
        id: target
        run: |
          # workflow_dispatch 触发
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ inputs.service }}"
          # repository_dispatch 触发（从 webhook payload 读取）
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SERVICE="${{ github.event.client_payload.service }}"
            if [ -z "$SERVICE" ]; then
              echo "❌ Error: service not specified in webhook payload"
              exit 1
            fi
          fi

          echo "service=${SERVICE}" >> $GITHUB_OUTPUT
          echo "📦 Deploying: ${SERVICE}"

      # 部署服务
      - name: Deploy ${{ steps.target.outputs.service }}
        run: |
          SERVICE="${{ steps.target.outputs.service }}"

          if [ "$SERVICE" = "all" ]; then
            echo "🚀 Deploying all external apps..."
            for app in meilisearch owen-blog; do
              echo "Deploying ${app}..."
              mise run build-${app}
              mise run deploy-${app}
            done
          else
            echo "🚀 Deploying ${SERVICE}..."
            mise run build-${SERVICE}
            mise run deploy-${SERVICE}
          fi
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
          ANSIBLE_SSH_PRIVATE_KEY_FILE: ~/.ssh/id_rsa

      # 部署结果通知
      - name: Deployment summary
        if: always()
        run: |
          SERVICE="${{ steps.target.outputs.service }}"

          echo "### External App Deployment Result 🌐" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Service: \`${SERVICE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "- Triggered by: Webhook" >> $GITHUB_STEP_SUMMARY
            echo "- Source repo: ${{ github.event.client_payload.repository || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Triggered by: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
