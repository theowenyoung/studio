run = "bash scripts/deploy-external-app.sh owen-blog"

# 数据库迁移部署
[tasks.deploy-db-admin]
description = "Run database migrations (auto-detect environment from git branch)"
run = "bash scripts/deploy-db-admin.sh"



# ==================== 服务器管理 (server-) ====================
#
# 任务分类原则：
#
# 【第一类】严格分支绑定 (Strict Branch Binding)
# - 规则：在 main 分支只能操作 Prod，在其他分支只能操作 Preview
# - 包括：deploy-*, server-update, sync-config, server-configure-aws, backup, clean-docker
# - 原因：这些操作会修改配置文件或同步代码，必须确保环境隔离
#
# 【第二类】显式指定目标 (Explicit Targeting)
# - 规则：必须在任务名中明确指定 -prod/-preview 后缀
# - 包括：server-init-*, server-resize-volume-*, ssh-*
# - 原因：初始化/危险操作太重要，resize 频率极低，必须手动确认目标
#
# ====================

# SSH 连接 (显式指定目标 - 只读操作)

[tasks.ssh]
description = "SSH to prod server and cd to /srv/studio"
run = 'ssh -t deploy@5.78.126.18 "cd /srv/studio && exec bash -l"'
alias = "ssh-prod"

[tasks.ssh-preview]
description = "SSH to preview server and cd to /srv/studio"
run = 'ssh -t deploy@49.13.31.185 "cd /srv/studio && exec bash -l"'

# 用脚本创建初始用户
[tasks.server-init-user]
description = "Create deploy user on server(s)"
usage = '''
arg "<ip>" var=#true
flag "-u --user <user>" help="admin user" default="root" env="ADMIN_USER"
'''
run = '''
for ip in ${usage_ip?}; do
  rsync -chazP ./scripts/create-init-user.sh ${usage_user?}@$ip:
  ssh ${usage_user?}@$ip 'bash create-init-user.sh'
done
'''


# 服务器初始化 (显式指定目标 - 极度危险，必须手动确认)
# 规则: 初始化操作太危险且频率极低，必须显式指定目标，不自动检测
[tasks.server-init]
description = "Initialize all servers (prod + preview) in parallel - DANGEROUS"
run = "ansible-playbook -i ansible/inventory.yml ansible/playbooks/init-server.yml -e force_system_update=true"

[tasks.server-init-prod]
description = "Initialize prod server only (security, docker, directories, mise, aliases)"
run = "ansible-playbook -i ansible/inventory.yml ansible/playbooks/init-server.yml -e force_system_update=true -l prod"

[tasks.server-init-preview]
description = "Initialize preview server only (security, docker, directories, mise, aliases)"
run = "ansible-playbook -i ansible/inventory.yml ansible/playbooks/init-server.yml -e force_system_update=true -l preview"

# 服务器配置更新 (严格分支绑定，跳过系统更新)
[tasks.server-update]
description = "Update server configuration without system update (auto-detect target)"
run = "bash scripts/server-operation.sh update init-server.yml"

# 系统包更新 (单独执行，耗时较长)
[tasks.server-apt-upgrade]
description = "Run apt upgrade on server (slow, auto-detect target)"
run = "bash scripts/server-operation.sh apt-upgrade init-server.yml force_system_update=true"

# 同步服务器配置 (严格分支绑定)
[tasks.sync-config]
description = "Sync server-mise.toml and bash_aliases (auto-detect target: main→prod, other→preview)"
run = "bash scripts/server-operation.sh sync-config sync-server-config.yml"

# 配置 AWS 凭证 (严格分支绑定)
[tasks.server-configure-aws]
description = "Configure AWS credentials for ECR access (auto-detect target: main→prod, other→preview)"
run = "bash scripts/server-operation.sh configure-aws configure-aws-credentials.yml"

# 备份与恢复（通过 Ansible 触发）
[tasks.server-backup]
description = "Run backup (auto-detect environment, production only)"
run = "bash scripts/server-operation.sh backup run-backup.yml"
alias = "backup"

# Volume 管理 (显式指定目标 - 危险操作)
[tasks.server-resize-volume-prod]
description = "Resize Hetzner volume on prod server (expand filesystem)"
run = "ansible-playbook -i ansible/inventory.yml ansible/playbooks/resize.yml -l prod"

[tasks.server-resize-volume-preview]
description = "Resize Hetzner volume on preview server (expand filesystem)"
run = "ansible-playbook -i ansible/inventory.yml ansible/playbooks/resize.yml -l preview"

# Docker 数据清理（系统重建前备份）
[tasks.server-clean-docker]
description = "Clean Docker data (auto-detect environment, move to .old backup before rebuild)"
run = "bash scripts/server-operation.sh clean-docker clean-docker.yml"
alias = "clean-docker"

# Note: 其他服务器运维任务（查看日志、恢复数据库、查看备份等）
# 请 SSH 到服务器后使用 server-mise.toml 中定义的任务
# 例如：mise ssh-studio 然后 mise run db-restore-local

# ==================== 通用工具 (无前缀) ====================

[tasks.lint]
description = "Lint all projects"
run = 'pnpm --filter "./js-apps/*" lint'

[tasks.format]
description = "Format code with Prettier"
run = 'prettier --write "**/*.{ts,tsx,md}"'

[tasks.test]
description = "Run tests"
run = 'pnpm --filter "./js-apps/*" test'

[tasks.clean]
description = "Clean build artifacts"
run = 'pnpm --filter "./js-apps/*" clean'

[tasks.install]
description = "Install dependencies"
run = 'pnpm --filter "./js-apps/*" install'

[tasks.build]
description = "Build all projects"
run = 'pnpm --filter "./js-apps/*" build'

[tasks.serve]
description = "Serve built applications"
run = 'pnpm --filter "./js-apps/*" start'

# ==================== 辅助工具 ====================

[tasks.build-db-admin]
description = "Build db-admin (prepare migrations)"
run = "bash infra-apps/db-admin/build.sh"

[tasks.build-psenv]
description = "Build psenv Rust tool"
run = 'cargo build --release'
dir = "rust-packages/psenv"

[tasks.release-psenv]
description = "Publish psenv to crates.io"
run = 'cargo publish'
dir = "rust-packages/psenv"

# ==================== AWS ECR 管理 ====================

[tasks.ecr-setup-lifecycle]
description = "Setup lifecycle policies for all ECR repositories"
run = "bash scripts/setup-ecr-lifecycle.sh"
alias = "ecr-lifecycle"

# ==================== 动态任务 ====================

[tasks.addjs]
description = "Add package to a specific JS project"
usage = '''
arg "<project>"
arg "[packages]" var=#true
'''
run = 'pnpm --filter "./js-apps/${usage_project?}" add ${usage_packages?}'

[tasks.buildjs]
description = "Run custom build command for a JS project"
usage = '''
arg "<project>"
arg "[args]" var=#true
'''
run = 'pnpm --filter "./js-apps/${usage_project?}" ${usage_args?}'

# ==================== 预览环境管理 ====================

[tasks.preview-list]
description = "List all preview environments (by branch)"
alias = "previews"
run = "bash scripts/preview-list.sh"

[tasks.preview-delete]
description = "Delete a preview environment by branch name"
run = "bash scripts/preview-delete.sh ${usage_branch:-} ${usage_yes:+--yes}"
usage = '''
arg "<branch>" help="Branch name to delete (e.g., feat-test)"
flag "-y --yes" help="Skip confirmation"
'''
